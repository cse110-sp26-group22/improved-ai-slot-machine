<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirate's Booty Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header class="game-header">
            <h1><span class="header-icon">🏴‍☠️</span> Pirate's Booty <span class="header-icon">⛵</span></h1>
        </header>

        <div id="slot-machine">
            <div class="displays">
                <div class="display-box">
                    <h2>Treasure</h2>
                    <p id="balance-display">$1000</p>
                </div>
                <div class="display-box">
                    <h2>Last Win</h2>
                    <p id="win-display">$0</p>
                </div>
                <div class="display-box">
                    <h2>Wager</h2>
                    <p id="bet-display">$25</p>
                </div>
            </div>

            <div class="reels">
                <div class="reel" id="reel1"></div>
                <div class="reel" id="reel2"></div>
                <div class="reel" id="reel3"></div>
                <div class="payline"></div>
            </div>
        </div>

        <div id="controls">
            <div class="bet-controls">
                <button class="bet-option" data-bet="25">$25</button>
                <button class="bet-option" data-bet="50">$50</button>
                <button class="bet-option" data-bet="100">$100</button>
                <button class="bet-option" data-bet="250">$250</button>
                <button class="bet-option" data-bet="500">$500</button>
            </div>
            <button id="spin-button">FIRE! 💣</button>
        </div>

        <div id="utility-controls">
            <button id="emergency-deposit-button" class="hidden">Deposit $500</button>
            <button id="mute-button">Mute</button>
        </div>

        <div id="double-down-popup" class="hidden">
            <h2>Double Down?</h2>
            <p>Your bet will double!</p>
            <div id="double-down-timer">3</div>
            <div class="double-down-buttons">
                <button id="double-down-yes">Yes</button>
                <button id="double-down-no">No</button>
            </div>
        </div>

        <div id="splash-container" class="hidden">
            <div id="big-win-splash" class="splash hidden">
                <h2>BIG WIN!</h2>
            </div>
            <div id="jackpot-splash" class="splash hidden">
                <h2>JACKPOT!</h2>
            </div>
        </div>
    <script type="module" src="script.js"></script>
</body>
</html>
