<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON REELS 3000 | CYBER-ARCADE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="game-container">
        <header>
            <div class="logo-container">
                <h1 class="neon-text" data-text="NEON REELS 3000">NEON REELS 3000</h1>
                <div class="sub-logo">ULTRA-PAY SLOTS</div>
            </div>
            
            <div class="display-panel">
                <div class="panel-item main-balance">
                    <span class="label">CREDITS</span>
                    <div class="value-wrapper">
                        <span class="unit">$</span>
                        <span id="balance" class="value">10.00</span>
                    </div>
                </div>
                <div class="panel-item total-winnings">
                    <span class="label">TOTAL WON</span>
                    <div class="value-wrapper">
                        <span class="unit">$</span>
                        <span id="total-won" class="value highlight">0.00</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="arcade-cabinet">
            <div class="reels-frame">
                <div class="reels-container">
                    <div class="reel-column" id="column-0">
                        <div class="reel-strip" id="strip-0">
                            <!-- Symbols populated by JS -->
                        </div>
                    </div>
                    <div class="reel-column" id="column-1">
                        <div class="reel-strip" id="strip-1">
                            <!-- Symbols populated by JS -->
                        </div>
                    </div>
                    <div class="reel-column" id="column-2">
                        <div class="reel-strip" id="strip-2">
                            <!-- Symbols populated by JS -->
                        </div>
                    </div>
                    <div class="win-line-overlay"></div>
                </div>
                <div class="glass-glare"></div>
            </div>

            <div class="info-strip">
                <div id="win-display" class="message-display">INSERT COIN TO START</div>
                <div class="bet-info">BET: $<span id="bet">0.25</span></div>
            </div>
        </main>

        <footer>
            <div class="controls-grid">
                <div class="bet-controls">
                    <label for="bet-selector">WAGER SIZE</label>
                    <div class="select-wrapper">
                        <select id="bet-selector">
                            <option value="25">25 ($0.25)</option>
                            <option value="50">50 ($0.50)</option>
                            <option value="75">75 ($0.75)</option>
                            <option value="100">100 ($1.00)</option>
                            <option value="200">200 ($2.00)</option>
                            <option value="500">500 ($5.00)</option>
                            <option value="1000">1000 ($10.00)</option>
                            <option value="2000">2000 ($20.00)</option>
                        </select>
                    </div>
                </div>
                
                <button id="spin-btn" class="spin-btn">
                    <span class="btn-text">SPIN</span>
                    <span class="btn-glow"></span>
                </button>

                <div class="utility-btns">
                    <button id="audio-toggle" class="audio-btn off">
                        <span class="icon">🔈</span> MUSIC: OFF
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="js/slot-machine.js"></script>
    <script src="js/audio-manager.js"></script>
    <script src="js/ui-controller.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const game = new SlotMachine(1000); // Start with $10.00 (1000 credits)
            const audio = new AudioManager();
            const ui = new UIController(game, audio);
        });
    </script>
</body>
</html>
