<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegas Neon Slots</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-container">
        <header>
            <h1 class="neon-text">VEGAS SLOTS</h1>
        </header>

        <section class="display-panel">
            <div class="balance-info">
                <div class="balance-display">
                    Balance: <span id="balance-amount">$100</span>
                </div>
                <div class="streak-display">
                    Win Streak: <span id="win-streak">0</span>
                </div>
            </div>
            <div id="status-message" class="status-message">Good luck!</div>
        </section>

        <section class="slot-machine">
            <div class="reel" id="reel-1">?</div>
            <div class="reel" id="reel-2">?</div>
            <div class="reel" id="reel-3">?</div>
        </section>

        <section class="paytable">
            <h2 class="neon-text-small">PAYTABLE (3-OF-A-KIND)</h2>
            <div class="paytable-grid" id="paytable-grid">
                <!-- Symbols and payouts will be shown here -->
                <div class="pay-row"><span>7️⃣ Seven</span> <span>5000x</span></div>
                <div class="pay-row"><span>🍫 Bar</span> <span>100x</span></div>
                <div class="pay-row"><span>🍊 Orange</span> <span>30x</span></div>
                <div class="pay-row"><span>🍋 Lemon</span> <span>10x</span></div>
                <div class="pay-row"><span>🍒 Cherry</span> <span>5x</span></div>
            </div>
        </section>

        <section class="controls">
            <form id="bet-form">
                <fieldset class="bet-options">
                    <legend>Choose Bet</legend>
                    <label>
                        <input type="radio" name="bet" value="1" checked>
                        <span>$1</span>
                    </label>
                    <label>
                        <input type="radio" name="bet" value="5">
                        <span>$5</span>
                    </label>
                    <label>
                        <input type="radio" name="bet" value="10">
                        <span>$10</span>
                    </label>
                </fieldset>
                <div class="actions">
                    <button type="button" id="max-bet-button" class="spin-btn max-btn">MAX BET</button>
                    <button type="button" id="spin-button" class="spin-btn">SPIN</button>
                </div>
                <button type="button" id="reset-button" class="spin-btn hidden">RESET GAME</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
